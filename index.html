<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinHub - Gestão Financeira Familiar</title>
    
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel (para compilar React no Browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect } from "https://esm.sh/react@18";
        import { createRoot } from "https://esm.sh/react-dom@18/client";
        import { 
            LayoutDashboard, TrendingDown, TrendingUp, DollarSign,
            PieChart, Target, LogOut, Lock, Calendar, ListPlus,
            Tag, Trash2, Edit2, Plus, Settings, User as UserIcon, Key, Loader2,
            BarChart3
        } from "https://esm.sh/lucide-react@0.263.1";

        // --- FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- FIREBASE CONFIGURATION (Suas Chaves) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAWsiRWFynuzmmVWtijPPugnZiA27Kus5I",
            authDomain: "finlhub.firebaseapp.com",
            projectId: "finlhub",
            storageBucket: "finlhub.firebasestorage.app",
            messagingSenderId: "80100152503",
            appId: "1:80100152503:web:25bec2eba2315d79e0a932",
            measurementId: "G-H5BFZXXT88"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- INITIAL STATE ---
        const INITIAL_CATEGORIES = ['Habitação', 'Alimentação', 'Lazer', 'Transporte', 'Saúde', 'Educação', 'Outros'];

        // --- HELPER FUNCTIONS ---
        const addMonthsToPeriod = (periodStr, monthsToAdd) => {
            if (!periodStr) return '';
            const [year, month] = periodStr.split('-').map(Number);
            const date = new Date(year, month - 1 + monthsToAdd, 1);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        };

        const formatPeriodLabel = (periodStr) => {
            if (!periodStr) return '';
            const [year, month] = periodStr.split('-');
            const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            return `${meses[parseInt(month) - 1]}/${year.substring(2)}`;
        };

        // --- COMPONENTS ---
        const SidebarItem = ({ icon: Icon, label, isActive, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors duration-200 ${isActive ? 'bg-green-600/20 text-green-400 border-r-4 border-green-500' : 'text-zinc-400 hover:bg-zinc-800 hover:text-white'}`}>
                <Icon size={20} />
                <span className="font-medium text-sm">{label}</span>
            </button>
        );

        // --- PAGES ---
        const AuthPage = () => {
            const [isLogin, setIsLogin] = useState(true);
            const [formData, setFormData] = useState({ name: '', email: '', password: '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                
                try {
                    if (isLogin) {
                        await signInWithEmailAndPassword(auth, formData.email, formData.password);
                    } else {
                        const userCredential = await createUserWithEmailAndPassword(auth, formData.email, formData.password);
                        try {
                            await updateProfile(userCredential.user, { displayName: formData.name });
                            await setDoc(doc(db, 'users', userCredential.user.uid, 'settings', 'categories'), { list: INITIAL_CATEGORIES });
                        } catch (firestoreErr) {
                            console.error("Aviso: Utilizador criado, mas falhou ao guardar definições no Firestore:", firestoreErr);
                        }
                    }
                } catch (err) {
                    console.error("Erro detalhado do Firebase:", err);
                    let msgErro = "Erro desconhecido: " + err.message;
                    if (err.code === 'auth/email-already-in-use') msgErro = 'Este e-mail já está registado. Tente iniciar sessão.';
                    else if (err.code === 'auth/invalid-credential') msgErro = 'Palavra-passe incorreta ou e-mail não encontrado.';
                    else if (err.code === 'auth/weak-password') msgErro = 'A palavra-passe é muito fraca (mínimo de 6 caracteres).';
                    else if (err.code === 'auth/operation-not-allowed') msgErro = 'Autenticação por E-mail/Palavra-passe não está ativada no painel do Firebase!';
                    else if (err.code === 'auth/network-request-failed') msgErro = 'Erro de rede. Verifique a sua ligação à internet.';
                    setError(msgErro);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex h-screen w-full items-center justify-center bg-black p-4">
                    <div className="w-full max-w-md bg-zinc-950 border border-zinc-800 p-8 rounded-2xl shadow-2xl">
                        <div className="text-center mb-8">
                            <h1 className="text-4xl font-black text-white tracking-tighter mb-2">FIN<span className="text-green-500">HUB</span></h1>
                            <p className="text-zinc-400 text-sm">{isLogin ? 'Bem-vindo de volta' : 'Crie a sua conta familiar'}</p>
                        </div>
                        {error && <div className="bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-3 rounded-lg mb-4 text-center">{error}</div>}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {!isLogin && (
                                <div>
                                    <label className="block text-sm text-zinc-400 mb-1">Nome Completo</label>
                                    <input type="text" required value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-zinc-900 border border-zinc-800 text-white rounded-lg p-3 focus:outline-none focus:border-green-500" />
                                </div>
                            )}
                            <div>
                                <label className="block text-sm text-zinc-400 mb-1">E-mail</label>
                                <input type="email" required value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full bg-zinc-900 border border-zinc-800 text-white rounded-lg p-3 focus:outline-none focus:border-green-500" />
                            </div>
                            <div>
                                <label className="block text-sm text-zinc-400 mb-1">Senha (Mín. 6 caracteres)</label>
                                <input type="password" required minLength="6" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} className="w-full bg-zinc-900 border border-zinc-800 text-white rounded-lg p-3 focus:outline-none focus:border-green-500" />
                            </div>
                            <button type="submit" disabled={loading} className="w-full bg-green-600 hover:bg-green-500 disabled:opacity-50 text-white font-bold py-3 rounded-lg transition-colors flex items-center justify-center mt-6">
                                {loading ? <Loader2 className="animate-spin" size={18} /> : <><Lock size={18} className="mr-2" /> {isLogin ? 'Entrar Seguro' : 'Criar Conta'}</>}
                            </button>
                        </form>
                        <div className="mt-6 text-center">
                            <button onClick={() => { setIsLogin(!isLogin); setError(''); setFormData({ name: '', email: '', password: '' }); }} className="text-sm text-green-500 hover:text-green-400">
                                {isLogin ? 'Não tem conta? Cadastre-se' : 'Já tem conta? Inicie sessão'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const SettingsPage = ({ user, categories }) => {
            const [newCat, setNewCat] = useState('');
            const [name, setName] = useState(user.displayName || 'Utilizador');
            const [password, setPassword] = useState('');
            const [msg, setMsg] = useState({ text: '', type: '' });

            const handleAddCategory = async (e) => {
                e.preventDefault();
                if (newCat.trim() && !categories.includes(newCat.trim())) {
                    const updatedCats = [...categories, newCat.trim()];
                    await setDoc(doc(db, 'users', user.uid, 'settings', 'categories'), { list: updatedCats });
                    setNewCat('');
                }
            };

            const handleDeleteCategory = async (catToRemove) => {
                const updatedCats = categories.filter(c => c !== catToRemove);
                await setDoc(doc(db, 'users', user.uid, 'settings', 'categories'), { list: updatedCats });
            };

            const handleUpdateProfile = async (e) => {
                e.preventDefault();
                setMsg({ text: 'A atualizar...', type: 'info' });
                try {
                    await updateProfile(auth.currentUser, { displayName: name });
                    if (password) {
                        await updatePassword(auth.currentUser, password);
                        setPassword('');
                    }
                    setMsg({ text: 'Perfil atualizado com sucesso!', type: 'success' });
                    setTimeout(() => setMsg({text: '', type: ''}), 3000);
                } catch (error) {
                    setMsg({ text: 'Erro ao atualizar. Se alterou a senha, certifique-se de que tem pelo menos 6 caracteres ou tente refazer o login.', type: 'error' });
                }
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8 pb-24 md:pb-0">
                    <div>
                        <h2 className="text-2xl font-bold text-white mb-1">Configurações</h2>
                        <p className="text-zinc-400 text-sm">Faça a gestão da sua conta e personalize categorias.</p>
                    </div>
                    {msg.text && (
                        <div className={`p-3 rounded-lg text-sm border ${msg.type === 'error' ? 'bg-red-500/10 border-red-500/50 text-red-500' : 'bg-green-500/10 border-green-500/50 text-green-500'}`}>
                            {msg.text}
                        </div>
                    )}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-xl h-fit">
                            <h3 className="text-white font-medium mb-6 flex items-center"><UserIcon size={18} className="mr-2 text-green-500"/> Dados da Conta</h3>
                            <form onSubmit={handleUpdateProfile} className="space-y-4">
                                <div>
                                    <label className="block text-xs text-zinc-400 mb-1">Nome de Utilizador</label>
                                    <input type="text" required value={name} onChange={e => setName(e.target.value)} className="w-full bg-black border border-zinc-800 text-white rounded-lg p-2 text-sm focus:border-green-500 outline-none" />
                                </div>
                                <div>
                                    <label className="block text-xs text-zinc-400 mb-1">E-mail (Imutável)</label>
                                    <input type="email" disabled value={user.email} className="w-full bg-black border border-zinc-800 text-zinc-500 rounded-lg p-2 text-sm outline-none cursor-not-allowed" />
                                </div>
                                <div className="pt-4 border-t border-zinc-800">
                                    <h4 className="text-sm font-medium text-white mb-4 flex items-center"><Key size={16} className="mr-2 text-zinc-400"/> Segurança</h4>
                                    <label className="block text-xs text-zinc-400 mb-1">Nova Senha (Mín. 6 caracteres)</label>
                                    <input type="password" minLength="6" placeholder="Deixe em branco para manter" value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-black border border-zinc-800 text-white rounded-lg p-2 text-sm focus:border-green-500 outline-none" />
                                </div>
                                <button type="submit" className="w-full bg-green-600 hover:bg-green-500 text-white text-sm font-bold py-2 rounded-lg transition-colors mt-4">Salvar Perfil</button>
                            </form>
                        </div>
                        <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-xl">
                            <h3 className="text-white font-medium mb-6 flex items-center"><Tag size={18} className="mr-2 text-green-500"/> Categorias de Despesa</h3>
                            <form onSubmit={handleAddCategory} className="flex space-x-2 mb-6">
                                <input type="text" placeholder="Nova Categoria..." value={newCat} onChange={e => setNewCat(e.target.value)} className="flex-1 bg-black border border-zinc-800 text-white rounded-lg p-2 text-sm focus:border-green-500 outline-none" />
                                <button type="submit" className="bg-zinc-800 hover:bg-green-600 text-white px-4 rounded-lg transition-colors"><Plus size={18} /></button>
                            </form>
                            <div className="space-y-2 max-h-[300px] overflow-y-auto custom-scrollbar pr-2">
                                {categories.map(cat => (
                                    <div key={cat} className="flex justify-between items-center p-3 bg-black rounded-lg border border-zinc-800">
                                        <span className="text-sm text-white">{cat}</span>
                                        <button onClick={() => handleDeleteCategory(cat)} className="text-zinc-500 hover:text-red-500 transition-colors"><Trash2 size={16} /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const BudgetChart = ({ plannedTransactions, availablePeriods }) => {
            let runningTotal = 0;
            const chartData = availablePeriods.map(period => {
                const plans = plannedTransactions.filter(p => p.period === period);
                const inc = plans.filter(p => p.type === 'income').reduce((s, p) => s + p.amount, 0);
                const exp = plans.filter(p => p.type === 'expense').reduce((s, p) => s + p.amount, 0);
                const balance = inc - exp;
                runningTotal += balance;
                return { period, inc, exp, balance, acc: runningTotal };
            });

            if (chartData.length === 0 || plannedTransactions.length === 0) return <div className="text-zinc-500 text-sm mt-4 text-center py-6 border border-dashed border-zinc-800 rounded-lg">Adicione meses e lançamentos para ver a projeção visual.</div>;

            const maxBarValue = Math.max(...chartData.map(d => Math.max(d.inc, d.exp)), 100);
            const height = 200;
            const width = chartData.length * 80;
            const barWidth = 16;
            const gap = 4;
            const scaleYBar = (height * 0.8) / maxBarValue;
            const accMin = Math.min(0, ...chartData.map(d => d.acc));
            const accMax = Math.max(0, ...chartData.map(d => d.acc));
            const accRange = accMax - accMin || 1;
            const zeroLineY = height - ((0 - accMin) / accRange) * height;

            const linePoints = chartData.map((d, i) => {
                const x = i * 80 + 40;
                const y = height - ((d.acc - accMin) / accRange) * height;
                return `${x},${y}`;
            }).join(' ');

            return (
                <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-xl mt-6 overflow-x-auto custom-scrollbar">
                    <h3 className="text-white font-medium mb-6">Evolução do Saldo (Mês a Mês)</h3>
                    <div className="relative" style={{ minWidth: `${Math.max(width, 400)}px` }}>
                        <svg width="100%" height={height} style={{ overflow: 'visible' }}>
                            {accMin < 0 && <line x1="0" y1={zeroLineY} x2="100%" y2={zeroLineY} stroke="#3f3f46" strokeDasharray="4 4" strokeWidth="1" />}
                            {chartData.map((d, i) => {
                                const xCenter = i * 80 + 40;
                                const hInc = d.inc * scaleYBar;
                                const hExp = d.exp * scaleYBar;
                                return (
                                    <g key={`bars-${i}`}>
                                        <rect x={xCenter - barWidth - (gap/2)} y={height - hInc} width={barWidth} height={hInc} fill="#22c55e" rx="2" opacity="0.8" />
                                        <rect x={xCenter + (gap/2)} y={height - hExp} width={barWidth} height={hExp} fill="#ef4444" rx="2" opacity="0.8" />
                                    </g>
                                );
                            })}
                            <polyline points={linePoints} fill="none" stroke="#3b82f6" strokeWidth="3" />
                            {chartData.map((d, i) => (
                                <circle key={`dot-${i}`} cx={i * 80 + 40} cy={height - ((d.acc - accMin) / accRange) * height} r="4" fill="#3b82f6" stroke="#18181b" strokeWidth="2" />
                            ))}
                        </svg>
                        <div className="flex mt-4">
                            {chartData.map((d, i) => (
                                <div key={`label-${i}`} className="text-center text-[10px] text-zinc-500 font-medium" style={{ width: '80px' }}>
                                    {formatPeriodLabel(d.period)}
                                    <div className={`mt-1 font-bold ${d.acc >= 0 ? 'text-blue-400' : 'text-red-400'}`}>
                                        {d.acc >= 0 ? '+' : ''}{Math.round(d.acc)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const BudgetSetup = ({ user, plannedTransactions, expenseCategories }) => {
            const currentYearMonth = new Date().toISOString().slice(0, 7);
            const availablePeriods = useMemo(() => {
                if (plannedTransactions.length === 0) return [currentYearMonth];
                return Array.from(new Set(plannedTransactions.map(p => p.period))).sort();
            }, [plannedTransactions]);
            
            const [selectedPeriod, setSelectedPeriod] = useState(currentYearMonth);
            const [editingId, setEditingId] = useState(null);
            const incomeCategories = ['Salário', 'Fonte diversa'];

            const defaultForm = { 
                type: 'expense', 
                description: '', 
                amount: '', 
                category: expenseCategories[0] || 'Outros', 
                isInstallment: false, 
                installmentsCount: 2,
                isRecurring: false,
                recurringEndPeriod: ''
            };
            const [formData, setFormData] = useState(defaultForm);

            const activeCategoryList = formData.type === 'income' ? incomeCategories : expenseCategories;
            const currentMonthPlans = useMemo(() => plannedTransactions.filter(p => p.period === selectedPeriod), [plannedTransactions, selectedPeriod]);

            // --- Cálculos Mensais ---
            const totalExpense = currentMonthPlans.reduce((acc, curr) => curr.type === 'expense' ? acc + curr.amount : acc, 0);
            const totalIncome = currentMonthPlans.reduce((acc, curr) => curr.type === 'income' ? acc + curr.amount : acc, 0);
            const balance = totalIncome - totalExpense;

            // --- Cálculos Anuais (Baseado no ano do mês selecionado) ---
            const currentYear = selectedPeriod.split('-')[0];
            const currentYearPlans = useMemo(() => {
                return plannedTransactions.filter(p => p.period.startsWith(currentYear));
            }, [plannedTransactions, currentYear]);

            const annualIncome = currentYearPlans.reduce((acc, curr) => curr.type === 'income' ? acc + curr.amount : acc, 0);
            const annualExpense = currentYearPlans.reduce((acc, curr) => curr.type === 'expense' ? acc + curr.amount : acc, 0);
            const annualBalance = annualIncome - annualExpense;

            const annualExpensesByCategory = useMemo(() => {
                const categories = currentYearPlans
                    .filter(p => p.type === 'expense')
                    .reduce((acc, curr) => {
                        acc[curr.category] = (acc[curr.category] || 0) + curr.amount;
                        return acc;
                    }, {});
                return Object.entries(categories).sort((a, b) => b[1] - a[1]);
            }, [currentYearPlans]);

            useEffect(() => {
                if (!availablePeriods.includes(selectedPeriod)) {
                    setSelectedPeriod(availablePeriods[0] || currentYearMonth);
                }
            }, [availablePeriods]);

            const handleAddMonth = () => {
                const lastPeriod = availablePeriods[availablePeriods.length - 1] || currentYearMonth;
                const nextPeriod = addMonthsToPeriod(lastPeriod, 1);
                setSelectedPeriod(nextPeriod);
            };

            const handleTypeChange = (newType) => setFormData({...formData, type: newType, category: newType === 'income' ? incomeCategories[0] : (expenseCategories[0] || 'Outros')});

            const handleEdit = (item) => {
                setEditingId(item.id);
                setFormData({ 
                    type: item.type, description: item.description, amount: item.amount, category: item.category, 
                    isInstallment: false, installmentsCount: 2, isRecurring: false, recurringEndPeriod: '' 
                });
            };

            const handleDelete = async (id) => {
                try {
                    await deleteDoc(doc(db, 'users', user.uid, 'plannedTransactions', id));
                } catch(e) {
                    console.error("Erro ao apagar:", e);
                    alert("Erro ao apagar lançamento. Verifique as regras do Firestore.");
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const baseAmount = parseFloat(formData.amount);
                if (isNaN(baseAmount)) return;

                if (editingId) {
                    try {
                        await updateDoc(doc(db, 'users', user.uid, 'plannedTransactions', editingId), { 
                            type: formData.type, category: formData.category, description: formData.description, amount: baseAmount, period: selectedPeriod 
                        });
                        setEditingId(null);
                        setFormData(defaultForm);
                    } catch (err) {
                        console.error("Erro ao atualizar:", err);
                        alert("Erro ao atualizar lançamento. Verifique permissões.");
                    }
                    return;
                }

                try {
                    const batch = writeBatch(db);
                    
                    // Lógica para Despesa/Receita Recorrente
                    if (formData.isRecurring) {
                        if (!formData.recurringEndPeriod || formData.recurringEndPeriod < selectedPeriod) {
                            alert("Por favor, selecione um mês final válido para o lançamento recorrente (igual ou posterior ao mês selecionado).");
                            return;
                        }
                        
                        let currentIter = selectedPeriod;
                        let iterCount = 0;
                        
                        while (currentIter <= formData.recurringEndPeriod && iterCount < 120) { // Trava de segurança: max 10 anos
                            const newId = Date.now().toString() + iterCount;
                            const docRef = doc(db, 'users', user.uid, 'plannedTransactions', newId);
                            batch.set(docRef, {
                                type: formData.type, category: formData.category, amount: baseAmount, period: currentIter,
                                description: formData.description, isInstallment: false, isRecurring: true
                            });
                            currentIter = addMonthsToPeriod(currentIter, 1);
                            iterCount++;
                        }
                        await batch.commit();

                    // Lógica para Compra Parcelada
                    } else if (formData.isInstallment && formData.installmentsCount > 1 && formData.type === 'expense') {
                        for (let i = 0; i < formData.installmentsCount; i++) {
                            const targetPeriod = addMonthsToPeriod(selectedPeriod, i);
                            const newId = Date.now().toString() + i;
                            const docRef = doc(db, 'users', user.uid, 'plannedTransactions', newId);
                            batch.set(docRef, {
                                type: formData.type, category: formData.category, amount: baseAmount, period: targetPeriod,
                                description: `${formData.description} (${i + 1}/${formData.installmentsCount})`, isInstallment: true
                            });
                        }
                        await batch.commit();

                    // Lógica para Lançamento Único
                    } else {
                        const newId = Date.now().toString();
                        await setDoc(doc(db, 'users', user.uid, 'plannedTransactions', newId), {
                            type: formData.type, category: formData.category, amount: baseAmount, period: selectedPeriod, description: formData.description, isInstallment: false, isRecurring: false
                        });
                    }
                    
                    setFormData(defaultForm);
                } catch (err) {
                    console.error("Erro ao gravar novo lançamento:", err);
                    alert("Erro ao guardar. Verifique se a sua base de dados Firestore está ativa e com as regras corretas.");
                }
            };

            return (
                <div className="space-y-6 pb-24 md:pb-0">
                    
                    {/* Header Controls */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                        <div>
                            <h2 className="text-xl font-bold text-white mb-1">Painel de Orçamento</h2>
                            <p className="text-zinc-400 text-sm">Projeção e planeamento financeiro detalhado.</p>
                        </div>
                        <div className="flex items-center space-x-2">
                            <div className="flex items-center space-x-2 bg-black border border-zinc-800 rounded-lg p-1">
                                <Calendar size={18} className="text-zinc-400 ml-2" />
                                <select className="bg-transparent text-white p-2 outline-none font-medium" value={selectedPeriod} onChange={(e) => setSelectedPeriod(e.target.value)}>
                                    {availablePeriods.includes(selectedPeriod) ? null : <option value={selectedPeriod}>{formatPeriodLabel(selectedPeriod)}</option>}
                                    {availablePeriods.map(p => <option key={p} value={p}>{formatPeriodLabel(p)} ({p})</option>)}
                                </select>
                            </div>
                            <button onClick={handleAddMonth} className="flex items-center px-3 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-white rounded-lg transition-colors border border-zinc-700">
                                <Plus size={18} className="md:mr-2" /><span className="hidden md:inline text-sm font-medium">Add Mês</span>
                            </button>
                        </div>
                    </div>

                    {/* --- NOVO: VISÃO GERAL DO ANO --- */}
                    <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-green-500/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3 pointer-events-none"></div>
                        
                        <div className="flex items-center mb-6">
                            <PieChart size={24} className="text-blue-500 mr-3" />
                            <h3 className="text-xl font-bold text-white">Resumo Anual ({currentYear})</h3>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
                            {/* Totais do Ano */}
                            <div className="space-y-4">
                                <div className="bg-black/50 border border-zinc-800/80 p-4 rounded-xl flex justify-between items-center backdrop-blur-sm">
                                    <span className="text-sm font-medium text-zinc-400">Receitas Acumuladas</span>
                                    <span className="text-xl font-bold text-green-400">R$ {annualIncome.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                </div>
                                <div className="bg-black/50 border border-zinc-800/80 p-4 rounded-xl flex justify-between items-center backdrop-blur-sm">
                                    <span className="text-sm font-medium text-zinc-400">Despesas Acumuladas</span>
                                    <span className="text-xl font-bold text-red-400">R$ {annualExpense.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                </div>
                                <div className={`border p-4 rounded-xl flex justify-between items-center backdrop-blur-sm ${annualBalance >= 0 ? 'bg-blue-900/20 border-blue-900/50' : 'bg-red-900/20 border-red-900/50'}`}>
                                    <span className="text-sm font-medium text-zinc-300">Balanço Final</span>
                                    <span className={`text-2xl font-black ${annualBalance >= 0 ? 'text-blue-400' : 'text-red-400'}`}>R$ {annualBalance.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                </div>
                            </div>

                            {/* Projeção por Categoria */}
                            <div>
                                <h4 className="text-xs font-bold text-zinc-500 mb-4 uppercase tracking-wider flex items-center">
                                    <BarChart3 size={14} className="mr-2" /> Projeção de Despesas por Categoria
                                </h4>
                                <div className="space-y-4 max-h-[220px] overflow-y-auto custom-scrollbar pr-3">
                                    {annualExpensesByCategory.length === 0 ? (
                                        <p className="text-sm text-zinc-500 text-center py-4 border border-dashed border-zinc-800 rounded-lg">Nenhuma despesa registada neste ano.</p>
                                    ) : (
                                        annualExpensesByCategory.map(([cat, amount]) => {
                                            const percentage = annualExpense > 0 ? (amount / annualExpense) * 100 : 0;
                                            return (
                                                <div key={cat} className="group">
                                                    <div className="flex justify-between text-xs mb-1.5">
                                                        <span className="font-medium text-zinc-300 group-hover:text-white transition-colors">{cat}</span>
                                                        <span className="text-zinc-400 font-medium">R$ {amount.toLocaleString('pt-BR', {minimumFractionDigits: 2})} <span className="text-zinc-600 ml-1">({percentage.toFixed(1)}%)</span></span>
                                                    </div>
                                                    <div className="w-full bg-zinc-800/80 rounded-full h-2 overflow-hidden">
                                                        <div className="bg-zinc-600 h-2 rounded-full group-hover:bg-blue-500 transition-colors" style={{ width: `${percentage}%` }}></div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* --- CONTROLO MENSAL (Lançamentos) --- */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Formulário de Input */}
                        <div className="lg:col-span-1 bg-zinc-900 border border-zinc-800 p-6 rounded-xl h-fit">
                            <h3 className="text-white font-medium mb-4 flex items-center">
                                {editingId ? <Edit2 size={18} className="mr-2 text-blue-500"/> : <ListPlus size={18} className="mr-2 text-green-500"/>}
                                {editingId ? 'Editar Previsão do Mês' : `Nova Previsão (${formatPeriodLabel(selectedPeriod)})`}
                            </h3>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-xs text-zinc-400 mb-1">Tipo</label>
                                        <select className={`w-full bg-black border border-zinc-800 text-white rounded-lg p-2 text-sm outline-none focus:border-green-500 ${formData.type === 'income' ? 'text-green-400' : 'text-red-400'}`} value={formData.type} onChange={e => handleTypeChange(e.target.value)}>
                                            <option value="expense">Despesa</option>
                                            <option value="income">Receita</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs text-zinc-400 mb-1">Valor (R$)</label>
                                        <input type="number" step="0.01" required placeholder="0.00" className="w-full bg-black border border-zinc-800 text-white rounded-lg p-2 text-sm focus:border-green-500 outline-none" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs text-zinc-400 mb-1">Descrição</label>
                                    <input type="text" required placeholder="Ex: Conta da Luz" className="w-full bg-black border border-zinc-800 text-white rounded-lg p-2 text-sm focus:border-green-500 outline-none" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-xs text-zinc-400 mb-1">Categoria</label>
                                    <select className="w-full bg-black border border-zinc-800 text-white rounded-lg p-2 text-sm focus:border-green-500 outline-none" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                        {activeCategoryList.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>

                                {!editingId && (
                                    <div className="pt-2 space-y-3 border-t border-zinc-800 mt-4">
                                        
                                        {/* Compra Parcelada - Apenas para despesas */}
                                        {formData.type === 'expense' && (
                                            <label className="flex items-center space-x-2 text-sm text-zinc-300 cursor-pointer">
                                                <input type="checkbox" className="rounded bg-zinc-800 border-zinc-700 text-green-500 focus:ring-green-500" 
                                                    checked={formData.isInstallment} 
                                                    onChange={e => setFormData({...formData, isInstallment: e.target.checked, isRecurring: false})} />
                                                <span>Compra parcelada?</span>
                                            </label>
                                        )}
                                        
                                        {formData.isInstallment && formData.type === 'expense' && (
                                            <div className="bg-black p-3 rounded-lg border border-zinc-800 mt-2">
                                                <label className="block text-xs text-zinc-400 mb-1">Quantidade de Meses</label>
                                                <input type="number" min="2" max="48" className="w-full bg-zinc-900 border border-zinc-700 text-white rounded-lg p-2 text-sm outline-none" value={formData.installmentsCount} onChange={e => setFormData({...formData, installmentsCount: parseInt(e.target.value)})} />
                                            </div>
                                        )}

                                        {/* Lançamento Recorrente - Despesas ou Receitas */}
                                        <label className="flex items-center space-x-2 text-sm text-zinc-300 cursor-pointer">
                                            <input type="checkbox" className="rounded bg-zinc-800 border-zinc-700 text-green-500 focus:ring-green-500" 
                                                checked={formData.isRecurring} 
                                                onChange={e => setFormData({...formData, isRecurring: e.target.checked, isInstallment: false, recurringEndPeriod: formData.recurringEndPeriod || addMonthsToPeriod(selectedPeriod, 11)})} />
                                            <span>Lançamento recorrente? (Ex: Aluguel)</span>
                                        </label>

                                        {formData.isRecurring && (
                                            <div className="bg-black p-3 rounded-lg border border-zinc-800 mt-2">
                                                <label className="block text-xs text-zinc-400 mb-1">Repetir até qual mês?</label>
                                                <input type="month" required className="w-full bg-zinc-900 border border-zinc-700 text-white rounded-lg p-2 text-sm outline-none focus:border-green-500" 
                                                    value={formData.recurringEndPeriod} 
                                                    min={selectedPeriod}
                                                    onChange={e => setFormData({...formData, recurringEndPeriod: e.target.value})} />
                                            </div>
                                        )}
                                    </div>
                                )}

                                <div className="flex space-x-2 pt-2">
                                    {editingId && <button type="button" onClick={() => { setEditingId(null); setFormData(defaultForm); }} className="w-1/3 bg-zinc-800 hover:bg-zinc-700 text-white text-sm font-bold py-2 rounded-lg transition-colors border border-zinc-700">Cancelar</button>}
                                    <button type="submit" className={`flex-1 text-white text-sm font-bold py-2 rounded-lg transition-colors ${editingId ? 'bg-blue-600 hover:bg-blue-500' : 'bg-green-600 hover:bg-green-500'}`}>
                                        {editingId ? 'Salvar Alterações' : 'Salvar Orçamento'}
                                    </button>
                                </div>
                            </form>
                        </div>

                        {/* Detalhes do Mês */}
                        <div className="lg:col-span-2 space-y-4">
                            <div className="grid grid-cols-3 gap-4">
                                <div className="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                                    <p className="text-[10px] text-zinc-400 uppercase tracking-wider mb-1">Receitas do Mês</p>
                                    <p className="text-lg font-bold text-green-400">R$ {totalIncome.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                </div>
                                <div className="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                                    <p className="text-[10px] text-zinc-400 uppercase tracking-wider mb-1">Despesas do Mês</p>
                                    <p className="text-lg font-bold text-red-400">R$ {totalExpense.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                </div>
                                <div className={`border p-4 rounded-xl ${balance >= 0 ? 'bg-blue-900/10 border-blue-900/30' : 'bg-red-900/10 border-red-900/30'}`}>
                                    <p className="text-[10px] text-zinc-400 uppercase tracking-wider mb-1">Saldo do Mês</p>
                                    <p className={`text-lg font-bold ${balance >= 0 ? 'text-blue-400' : 'text-red-400'}`}>R$ {balance.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                </div>
                            </div>
                            
                            <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-xl">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-white font-medium">Lançamentos em {formatPeriodLabel(selectedPeriod)}</h3>
                                </div>
                                <div className="space-y-2 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
                                    {currentMonthPlans.length === 0 ? <p className="text-zinc-500 text-sm text-center py-8">Nenhum item orçado para este mês.</p> : (
                                        currentMonthPlans.map(item => (
                                            <div key={item.id} className="flex justify-between items-center p-3 bg-black rounded-lg border border-zinc-800 hover:border-zinc-700 transition-colors group">
                                                <div className="flex items-center space-x-3">
                                                    <div className={`p-2 rounded-lg ${item.type === 'income' ? 'bg-green-500/10 text-green-500' : 'bg-zinc-900 text-zinc-400'}`}>
                                                        {item.type === 'income' ? <TrendingUp size={16} /> : <Tag size={16} />}
                                                    </div>
                                                    <div>
                                                        <p className="text-sm font-medium text-white">
                                                            {item.description}
                                                            {item.isRecurring && <span className="ml-2 text-[10px] bg-blue-500/20 text-blue-400 px-1.5 py-0.5 rounded">Recorrente</span>}
                                                        </p>
                                                        <p className="text-[10px] text-zinc-500 uppercase tracking-wider">{item.category}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center space-x-4">
                                                    <span className={`font-medium ${item.type === 'expense' ? 'text-red-400' : 'text-green-400'}`}>
                                                        {item.type === 'expense' ? '-' : '+'}R$ {item.amount.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                                                    </span>
                                                    <div className="flex space-x-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => handleEdit(item)} className="p-1.5 bg-zinc-800 hover:bg-blue-600 text-zinc-400 hover:text-white rounded transition-colors"><Edit2 size={14} /></button>
                                                        <button onClick={() => handleDelete(item.id)} className="p-1.5 bg-zinc-800 hover:bg-red-600 text-zinc-400 hover:text-white rounded transition-colors"><Trash2 size={14} /></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Gráfico Linear no Final */}
                    <BudgetChart plannedTransactions={plannedTransactions} availablePeriods={availablePeriods} />
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [user, setUser] = useState(null); 
            const [authLoading, setAuthLoading] = useState(true);
            const [isMobile, setIsMobile] = useState(false);
            const [currentTab, setCurrentTab] = useState('budget');
            
            const [plannedTransactions, setPlannedTransactions] = useState([]);
            const [expenseCategories, setExpenseCategories] = useState(INITIAL_CATEGORIES);

            // Escuta as mudanças de Autenticação em Tempo Real
            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Busca os dados do Firestore em Tempo Real
            useEffect(() => {
                if (!user) {
                    setPlannedTransactions([]);
                    setExpenseCategories(INITIAL_CATEGORIES);
                    return;
                }

                // Listener de Lançamentos
                const unsubPlans = onSnapshot(
                    collection(db, 'users', user.uid, 'plannedTransactions'), 
                    (snapshot) => {
                        const plans = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setPlannedTransactions(plans);
                    },
                    (error) => {
                        console.error("Erro ao ler dados Firestore:", error);
                        // Ignora falhas de permissão para manter a app a funcionar
                    }
                );

                // Listener de Categorias
                const unsubCats = onSnapshot(
                    doc(db, 'users', user.uid, 'settings', 'categories'), 
                    (docSnap) => {
                        if (docSnap.exists() && docSnap.data().list) {
                            setExpenseCategories(docSnap.data().list);
                        }
                    },
                    (error) => console.error("Erro ao ler categorias:", error)
                );

                return () => { unsubPlans(); unsubCats(); };
            }, [user]);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                handleResize(); 
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            if (authLoading) {
                return <div className="flex h-screen items-center justify-center bg-black text-green-500"><Loader2 className="animate-spin" size={48} /></div>;
            }

            if (!user) return <AuthPage />;

            return (
                <div className="flex h-screen bg-black font-sans overflow-hidden">
                    {!isMobile && (
                        <aside className="w-64 bg-zinc-950 border-r border-zinc-900 flex flex-col z-20">
                            <div className="p-6">
                                <h1 className="text-2xl font-black text-white tracking-tighter">FIN<span className="text-green-500">HUB</span></h1>
                                <p className="text-xs text-zinc-500 mt-1">Gestão Familiar Avançada</p>
                            </div>
                            <nav className="flex-1 px-4 space-y-2 overflow-y-auto custom-scrollbar">
                                <SidebarItem icon={Target} label="Orçamento" isActive={currentTab === 'budget'} onClick={() => setCurrentTab('budget')} />
                                <SidebarItem icon={Settings} label="Configurações" isActive={currentTab === 'settings'} onClick={() => setCurrentTab('settings')} />
                            </nav>
                            <div className="p-4 border-t border-zinc-900 flex items-center justify-between">
                                <div className="flex items-center space-x-3">
                                    <div className="w-8 h-8 rounded-full bg-green-900 flex items-center justify-center text-green-400 font-bold border border-green-700">
                                        {(user.displayName || user.email || 'U').charAt(0).toUpperCase()}
                                    </div>
                                    <div className="overflow-hidden">
                                        <p className="text-sm font-medium text-white truncate w-24">{user.displayName || 'Utilizador'}</p>
                                    </div>
                                </div>
                                <button onClick={() => signOut(auth)} className="text-zinc-500 hover:text-red-400"><LogOut size={18} /></button>
                            </div>
                        </aside>
                    )}

                    <main className="flex-1 overflow-y-auto bg-black text-zinc-100 relative">
                        <div className="p-4 md:p-8">
                            {currentTab === 'budget' && (
                                <BudgetSetup user={user} plannedTransactions={plannedTransactions} expenseCategories={expenseCategories} />
                            )}
                            {currentTab === 'settings' && (
                                <SettingsPage user={user} categories={expenseCategories} />
                            )}
                        </div>
                        
                        {isMobile && (
                            <nav className="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-900 flex justify-around p-3 pb-safe z-20 shadow-[0_-4px_15px_rgba(0,0,0,0.5)]">
                                <button onClick={() => setCurrentTab('budget')} className={`flex flex-col items-center p-2 ${currentTab === 'budget' ? 'text-green-500' : 'text-zinc-500'}`}><Target size={24} /><span className="text-[10px] mt-1 font-medium">Orçamento</span></button>
                                <button onClick={() => setCurrentTab('settings')} className={`flex flex-col items-center p-2 ${currentTab === 'settings' ? 'text-green-500' : 'text-zinc-500'}`}><Settings size={24} /><span className="text-[10px] mt-1 font-medium">Configurações</span></button>
                            </nav>
                        )}
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
